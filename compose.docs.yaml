# compose.docs.yaml — 静态文档站服务
#
# 用法:
#   生产部署: ./scripts/deploy.sh
#   本地发布: ./scripts/docs-release.sh publish-local (默认绑定 8004)

services:
  docs:
    build:
      context: .
      dockerfile: Dockerfile.docs
    restart: unless-stopped
    ports:
      - "${MIND_DOCS_BIND:-0.0.0.0:8001}:80"
    healthcheck:
      test:
        - CMD-SHELL
        - wget -q -O /dev/null http://127.0.0.1/ || exit 1
      interval: 20s
      timeout: 5s
      retries: 5
      start_period: 10s
