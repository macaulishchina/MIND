# =============================================================================
# MIND 配置文件
# 所有 LLM 相关配置的唯一真相来源（默认值）
# 上层服务可通过编程接口 override 任意字段
# =============================================================================

# ---------------------------------------------------------------------------
# LLM 配置
# ---------------------------------------------------------------------------
[llm]
provider    = "deepseek"          # openai | anthropic | google | other provider
temperature = 0.0

[llm.openai]
protocols    = "openai"
api_key      = ""   # 官方 API KEY
base_url     = "https://api.openai.com"
sdk_base     = "/v1"            # OpenAI SDK 需要的 base path
llm_suffix   = "/chat/completions"
embed_suffix = "/embeddings"
model        = "gpt-5.4-nano"

[llm.anthropic]
protocols    = "anthropic"
api_key      = ""   # 官方 API KEY
base_url     = "https://api.anthropic.com"
sdk_base     = ""
llm_suffix   = "/v1/messages"
embed_suffix = ""
model        = "claude-haiku-4-5-20251001"

[llm.google]
protocols    = "google"
api_key      = ""
base_url     = "https://generativelanguage.googleapis.com"
sdk_base     = ""
llm_suffix   = "/v1beta/models/{model}:generateContent"
embed_suffix = ""
model        = "gemini-3.1-flash-lite-preview"

[llm.deepseek]
template     = "llm.openai"
api_key      = "sk-89ca9745534541139ca658fd4adb81ac"   # deepseek官方 API KEY
base_url     = "https://api.deepseek.com"
model        = "deepseek-chat"

# ---------------------------------------------------------------------------
# Embedding 配置
# ---------------------------------------------------------------------------
[embedding]
protocols    = "openai-embedding"
model       = "text-embedding-v4"
api_key     = "sk-TD63lM4dZ7cTR9MldMeNcHw0ny46I0CDEojWYndD7hQifcr6"
base_url    = "https://ai.leihuo.netease.com"
dimensions  = 1024

# ---------------------------------------------------------------------------
# 向量存储配置（纯本地组件，不调用 LLM，不消耗 token）
# Qdrant 是一个向量数据库，用于存储 Embedding 向量并做相似度检索
# ---------------------------------------------------------------------------
[vector_store]
provider        = "qdrant"
collection_name = "mind_memories"
url             = ""            # 留空 = in-memory 模式（进程退出数据丢失）
                                # 填写后连接远程 Qdrant 服务，如 "http://localhost:6333"
api_key         = ""            # 仅连接 Qdrant Cloud 时需要，本地开发留空
on_disk         = false

# ---------------------------------------------------------------------------
# 历史记录存储配置
# ---------------------------------------------------------------------------
[history_store]
db_path = "mind_history.db"

# ---------------------------------------------------------------------------
# 检索参数
# ---------------------------------------------------------------------------
[retrieval]
search_top_k     = 5           # search() 返回的最大结果数
similarity_top_k = 5           # add() 时去重搜索的 Top-K
