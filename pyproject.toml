[build-system]
requires = ["setuptools>=69", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "mind"
version = "0.1.0"
description = "Phase B/C baseline for the MIND memory system."
readme = "README.md"
requires-python = ">=3.12"
dependencies = [
    "pydantic>=2.12,<3",
]

[project.optional-dependencies]
dev = [
    "mypy>=1.18,<2",
    "pytest>=9,<10",
    "ruff>=0.11,<0.12",
]

[project.scripts]
mind-phase-b-gate = "mind.cli:phase_b_gate_main"

[tool.pytest.ini_options]
testpaths = ["tests"]
python_files = ["test_*.py"]

[tool.ruff]
line-length = 100
target-version = "py312"

[tool.ruff.lint]
select = ["E", "F", "I", "B", "UP"]

[tool.mypy]
python_version = "3.12"
files = ["mind", "tests", "scripts"]
warn_unused_configs = true
warn_redundant_casts = true
warn_unused_ignores = true
disallow_untyped_defs = true
no_implicit_optional = true
check_untyped_defs = true
