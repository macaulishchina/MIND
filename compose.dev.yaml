# compose.dev.yaml — 开发环境覆盖层
# 手动调用时, 仍需配合 compose.yaml 顶部说明显式传入:
#   --project-name / --env-file / MIND_ENV_FILE
#
# 功能:
#   - API 源码挂载 + uvicorn --reload 热更新
#   - MkDocs 文档站热更新
#   - DEBUG 日志级别
#   - Worker 缩短轮询间隔 (3s)
#   - 全局 MIND_DEV_MODE=true

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    volumes:
      # 源码热更新: 本地修改即时生效, 无需重新构建镜像
      - ./mind:/app/mind:ro
      - ./alembic:/app/alembic:ro
    environment:
      MIND_LOG_LEVEL: DEBUG
      MIND_DEV_MODE: "true"
    ports:
      - "8000:8000"
      # debugpy 远程调试端口 (可选: 在代码中 import debugpy; debugpy.listen(5678))
      - "5678:5678"

  worker:
    volumes:
      - ./mind:/app/mind:ro
    environment:
      MIND_LOG_LEVEL: DEBUG
      MIND_DEV_MODE: "true"
    command:
      - /bin/sh
      - -lc
      - |
        while true; do
          date +%s > /tmp/worker-heartbeat
          mindtest-offline-worker-once --dsn "$MIND_POSTGRES_DSN" --max-jobs 5 || true
          sleep 3
        done

  docs:
    build:
      context: .
      dockerfile: Dockerfile.docs.dev
      args:
        PIP_INDEX_URL: ${MIND_PIP_INDEX_URL:-https://pypi.tuna.tsinghua.edu.cn/simple}
        PIP_EXTRA_INDEX_URL: ${MIND_PIP_EXTRA_INDEX_URL:-}
        PIP_TRUSTED_HOST: ${MIND_PIP_TRUSTED_HOST:-pypi.tuna.tsinghua.edu.cn}
    restart: unless-stopped
    volumes:
      - .:/app:ro
      - docs_site:/app/site
    ports:
      - "${MIND_DOCS_BIND:-0.0.0.0:8002}:8000"
    healthcheck:
      test:
        - CMD-SHELL
        - >
          python -c "import urllib.request;
          urllib.request.urlopen('http://127.0.0.1:8000/', timeout=5)"
      interval: 20s
      timeout: 5s
      retries: 5
      start_period: 20s

volumes:
  docs_site:
