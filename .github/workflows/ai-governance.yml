name: AI Governance

'on':
  pull_request:
    paths:
      - 'mind/**'
      - 'tests/**'
      - 'scripts/**'
      - 'alembic/**'
      - '.ai/**'
      - 'pyproject.toml'
  push:
    branches:
      - main
      - master
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ai-governance-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-and-type-check:
    name: Code Quality Gate
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install uv
        run: python -m pip install --upgrade pip uv

      - name: Sync dependencies
        run: uv sync --extra dev --extra api --extra mcp

      - name: Ruff lint check
        run: uv run ruff check mind/ tests/ scripts/

      - name: Ruff format check
        run: uv run ruff format --check mind/ tests/ scripts/

      - name: MyPy type check
        run: uv run mypy mind/ tests/ scripts/

  tests:
    name: Test Suite
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install uv
        run: python -m pip install --upgrade pip uv

      - name: Sync dependencies
        run: uv sync --extra dev --extra api --extra mcp

      - name: Run test suite
        run: uv run pytest tests/ -x --tb=short

  ai-rules-integrity:
    name: AI Rules Integrity
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Verify .ai/ structure integrity
        run: |
          echo "Checking .ai/ directory structure..."
          required_files=(
            ".ai/CONSTITUTION.md"
            ".ai/ARCHITECTURE.md"
            ".ai/CONVENTIONS.md"
            ".ai/CURRENT_STATE.md"
            ".ai/CHANGE_PROTOCOL.md"
            ".ai/rules/kernel.md"
            ".ai/rules/primitives.md"
            ".ai/rules/app-services.md"
            ".ai/rules/api.md"
            ".ai/rules/testing.md"
            ".ai/rules/migration.md"
            ".ai/rules/docs.md"
            ".ai/checklists/new-service.md"
            ".ai/checklists/new-endpoint.md"
            ".ai/checklists/new-primitive.md"
            ".ai/checklists/bug-fix.md"
            ".ai/checklists/refactor.md"
            ".ai/health/drift-log.md"
          )
          missing=0
          for f in "${required_files[@]}"; do
            if [ ! -f "$f" ]; then
              echo "❌ MISSING: $f"
              missing=$((missing + 1))
            else
              echo "✅ $f"
            fi
          done
          if [ $missing -gt 0 ]; then
            echo ""
            echo "❌ $missing required .ai/ files are missing!"
            exit 1
          fi
          echo ""
          echo "✅ All .ai/ governance files present."

      - name: Check CONSTITUTION.md size
        run: |
          lines=$(wc -l < .ai/CONSTITUTION.md)
          echo "CONSTITUTION.md: $lines lines"
          if [ "$lines" -gt 500 ]; then
            echo "❌ CONSTITUTION.md exceeds 500 line limit ($lines lines)"
            exit 1
          fi
          echo "✅ CONSTITUTION.md within size limit."

  change-protocol-check:
    name: Change Protocol Compliance
    runs-on: ubuntu-latest
    timeout-minutes: 5
    if: github.event_name == 'pull_request'
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Check service-test synchronization
        run: |
          echo "Checking if service changes have corresponding test changes..."
          
          # Get changed files in PR
          changed_files=$(git diff --name-only origin/${{ github.base_ref }}...HEAD 2>/dev/null || echo "")
          
          if [ -z "$changed_files" ]; then
            echo "No changed files detected."
            exit 0
          fi
          
          warnings=0
          
          # Check: service changes should have test changes
          service_changes=$(echo "$changed_files" | grep "^mind/app/services/" || true)
          test_changes=$(echo "$changed_files" | grep "^tests/" || true)
          
          if [ -n "$service_changes" ] && [ -z "$test_changes" ]; then
            echo "⚠️  WARNING: Service files changed but no test files changed"
            echo "   Changed services:"
            echo "$service_changes" | sed 's/^/     /'
            warnings=$((warnings + 1))
          fi
          
          # Check: API changes should have doc changes
          api_changes=$(echo "$changed_files" | grep "^mind/api/" || true)
          doc_changes=$(echo "$changed_files" | grep "^docs/" || true)
          
          if [ -n "$api_changes" ] && [ -z "$doc_changes" ]; then
            echo "⚠️  WARNING: API files changed but no doc files changed"
            echo "   Changed API files:"
            echo "$api_changes" | sed 's/^/     /'
            warnings=$((warnings + 1))
          fi
          
          # Check: kernel store changes should have both backends
          sqlite_changes=$(echo "$changed_files" | grep "mind/kernel/store.py" || true)
          pg_changes=$(echo "$changed_files" | grep "mind/kernel/postgres_store.py" || true)
          
          if [ -n "$sqlite_changes" ] && [ -z "$pg_changes" ]; then
            echo "⚠️  WARNING: SQLite store changed but PostgreSQL store not changed"
            warnings=$((warnings + 1))
          fi
          if [ -n "$pg_changes" ] && [ -z "$sqlite_changes" ]; then
            echo "⚠️  WARNING: PostgreSQL store changed but SQLite store not changed"
            warnings=$((warnings + 1))
          fi
          
          if [ $warnings -gt 0 ]; then
            echo ""
            echo "⚠️  $warnings change protocol warnings detected."
            echo "   Please verify these are intentional. See .ai/CHANGE_PROTOCOL.md"
          else
            echo "✅ No change protocol violations detected."
          fi
          
          # Warnings don't block — they're informational
          exit 0
