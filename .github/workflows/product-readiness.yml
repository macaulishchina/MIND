name: Product Readiness

'on':
  pull_request:
    paths:
      - '.github/workflows/product-readiness.yml'
      - 'mind/**'
      - 'frontend/**'
      - 'tests/**'
      - 'scripts/**'
      - 'docs/**'
      - 'alembic/**'
      - 'compose*.yaml'
      - 'Dockerfile*'
      - 'pyproject.toml'
      - 'uv.lock'
  push:
    branches:
      - main
    tags:
      - 'v*'
      - 'release-v*'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: product-readiness-${{ github.ref }}
  cancel-in-progress: true

jobs:
  gate:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install uv
        run: python -m pip install --upgrade pip uv

      - name: Sync runtime dependencies
        run: uv sync --extra docs --extra api --extra mcp

      - name: Create artifact directory
        run: mkdir -p artifacts/product

      - name: Generate product artifact bundle
        run: ./scripts/product-readiness-artifacts.sh --output-dir artifacts/product

      - name: Publish product readiness step summary
        if: always()
        run: |
          if [ -n "${GITHUB_STEP_SUMMARY:-}" ]; then
            for summary in \
              artifacts/product/transport_audit_report.md \
              artifacts/product/deployment_smoke_report.md \
              artifacts/product/product_readiness_report.md \
              artifacts/product/product_readiness_gate.md; do
              if [ -f "$summary" ]; then
                cat "$summary" >> "$GITHUB_STEP_SUMMARY"
                printf '\n' >> "$GITHUB_STEP_SUMMARY"
              fi
            done
          fi

      - name: Upload product readiness gate artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: product-readiness-artifacts
          path: |
            artifacts/product/transport_audit_report.json
            artifacts/product/transport_audit_report.md
            artifacts/product/deployment_smoke_report.json
            artifacts/product/deployment_smoke_report.md
            artifacts/product/product_readiness_report.json
            artifacts/product/product_readiness_report.md
            artifacts/product/product_readiness_gate.json
            artifacts/product/product_readiness_gate.md
          if-no-files-found: error
