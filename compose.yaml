# compose.yaml — 公共基础配置
#
# 用法 (推荐通过脚本调用):
#   开发: ./scripts/dev.sh
#   生产: ./scripts/deploy.sh
#
# 手动调用时, 请同时指定:
#   1. --project-name 区分 dev / prod 资源
#   2. --env-file      指向对应运行时环境文件
#   3. MIND_ENV_FILE   让 service env_file 读取同一份文件

services:
  postgres:
    image: pgvector/pgvector:pg16
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${MIND_POSTGRES_DB:-mind}
      POSTGRES_USER: ${MIND_POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${MIND_POSTGRES_PASSWORD:-postgres}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test:
        - CMD-SHELL
        - pg_isready -U "$${POSTGRES_USER}" -d "$${POSTGRES_DB}"
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  api:
    build:
      context: .
      dockerfile: Dockerfile.api
      args:
        PIP_INDEX_URL: ${MIND_PIP_INDEX_URL:-https://pypi.tuna.tsinghua.edu.cn/simple}
        PIP_EXTRA_INDEX_URL: ${MIND_PIP_EXTRA_INDEX_URL:-}
        PIP_TRUSTED_HOST: ${MIND_PIP_TRUSTED_HOST:-pypi.tuna.tsinghua.edu.cn}
    restart: unless-stopped
    env_file:
      - ${MIND_ENV_FILE:-.env}
    environment:
      MIND_POSTGRES_DSN: ${MIND_POSTGRES_DSN}
      MIND_API_KEY: ${MIND_API_KEY}
      MIND_API_BIND: ${MIND_API_BIND:-0.0.0.0:8000}
      MIND_PROVIDER: ${MIND_PROVIDER:-stub}
      MIND_MODEL: ${MIND_MODEL:-deterministic}
      MIND_LOG_LEVEL: ${MIND_LOG_LEVEL:-INFO}
      MIND_DEV_MODE: ${MIND_DEV_MODE:-false}
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "8000:8000"
    healthcheck:
      test:
        - CMD-SHELL
        - >
          python -c "import os, urllib.request;
          req = urllib.request.Request(
          'http://127.0.0.1:8000/v1/system/health',
          headers={'X-API-Key': os.environ['MIND_API_KEY']},
          );
          urllib.request.urlopen(req, timeout=5)"
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 15s

  worker:
    build:
      context: .
      dockerfile: Dockerfile.worker
      args:
        PIP_INDEX_URL: ${MIND_PIP_INDEX_URL:-https://pypi.tuna.tsinghua.edu.cn/simple}
        PIP_EXTRA_INDEX_URL: ${MIND_PIP_EXTRA_INDEX_URL:-}
        PIP_TRUSTED_HOST: ${MIND_PIP_TRUSTED_HOST:-pypi.tuna.tsinghua.edu.cn}
    restart: unless-stopped
    env_file:
      - ${MIND_ENV_FILE:-.env}
    environment:
      MIND_POSTGRES_DSN: ${MIND_POSTGRES_DSN}
      MIND_LOG_LEVEL: ${MIND_LOG_LEVEL:-INFO}
      MIND_DEV_MODE: ${MIND_DEV_MODE:-false}
    depends_on:
      postgres:
        condition: service_healthy
    command:
      - /bin/sh
      - -lc
      - |
        while true; do
          date +%s > /tmp/worker-heartbeat
          mindtest-offline-worker-once --dsn "$MIND_POSTGRES_DSN" --max-jobs 5 || true
          sleep 10
        done
    healthcheck:
      test:
        - CMD-SHELL
        - >
          python -c "import pathlib, sys, time;
          path = pathlib.Path('/tmp/worker-heartbeat');
          ok = path.exists() and (time.time() - path.stat().st_mtime) < 120;
          raise SystemExit(0 if ok else 1)"
      interval: 20s
      timeout: 5s
      retries: 5
      start_period: 20s

volumes:
  postgres_data:
